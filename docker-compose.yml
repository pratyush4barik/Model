version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg17-trixie
    container_name: pgvec
    ports:
      - "55432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: visit_db
    volumes:
      - ./pgvector:/var/lib/postgresql/data